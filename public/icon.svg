<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded TV body -->
  <rect x="56" y="96" width="400" height="320" rx="48" ry="48" fill="#2a1f1a"/>
  <rect x="56" y="96" width="400" height="320" rx="48" ry="48" fill="none" stroke="#d4a574" stroke-width="16"/>

  <!-- Screen area -->
  <rect x="96" y="136" width="320" height="240" rx="24" ry="24" fill="#1c1714"/>

  <!-- Play triangle -->
  <polygon points="228,196 228,316 328,256" fill="#d4a574" opacity="0.85"/>

  <!-- Antenna legs -->
  <line x1="196" y1="96" x2="136" y2="24" stroke="#d4a574" stroke-width="14" stroke-linecap="round"/>
  <line x1="316" y1="96" x2="376" y2="24" stroke="#d4a574" stroke-width="14" stroke-linecap="round"/>

  <!-- Antenna tips -->
  <circle cx="136" cy="24" r="10" fill="#e8c9a0"/>
  <circle cx="376" cy="24" r="10" fill="#e8c9a0"/>

  <!-- Little feet -->
  <rect x="136" y="416" width="40" height="24" rx="8" fill="#d4a574"/>
  <rect x="336" y="416" width="40" height="24" rx="8" fill="#d4a574"/>
</svg>
